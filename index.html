<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Taxas - Mandaguaçu/PR</title>
    <style>
        :root {
            --azul-mandaguacu: #00008B;
            --amarelo-nota: #FFF9C4; /* Tom amarelo pastel sutil */
        }

        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: #f4f7f6; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        
        .header { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 3px solid var(--azul-mandaguacu); }
        .logo { max-width: 100%; height: auto; max-height: 110px; }
        .titulo-app { margin-top: 15px; color: var(--azul-mandaguacu); font-size: 1.4em; font-weight: bold; text-transform: uppercase; }

        label { display: block; margin-top: 15px; font-weight: 600; color: #333; }
        select, input, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        
        #painelDescricao {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background-color: #f8f9fa;
            border-left: 4px solid var(--azul-mandaguacu);
            font-size: 0.9em;
            color: #555;
            border-radius: 4px;
        }

        button { background-color: var(--azul-mandaguacu); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; }

        .result-box { margin-top: 25px; padding: 20px; border-radius: 10px; border: 1px solid #d1d9e6; display: none; }
        .total-destaque { text-align: center; margin-bottom: 20px; padding: 15px; background: #EBF5FF; border-radius: 8px; border: 1px solid var(--azul-mandaguacu); }
        .total-destaque span { display: block; color: var(--azul-mandaguacu); font-size: 2em; font-weight: 800; }
        
        .detalhes-container { font-size: 0.85em; color: #555; background: #fcfcfc; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .detalhes-container strong { color: var(--azul-mandaguacu); display: block; margin-bottom: 8px; border-bottom: 1px solid #ddd; padding-bottom: 4px; text-transform: uppercase; }
        .linha { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .sub-total { font-weight: bold; color: #000; padding-top: 5px; margin-top: 5px; border-top: 1px dashed #ccc; }
        
        /* Estilo para o quadro de atenção/nota */
        .box-atencao {
            background-color: var(--amarelo-nota);
            border-radius: 4px;
            padding: 8px 12px;
            margin-top: 6px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #5d4037;
            border-left: 3px solid #fbc02d;
            line-height: 1.4;
        }
        .box-atencao a { color: #00008B; font-weight: bold; }
    </style>
</head>

        <div class="titulo-app">Simulador de Taxas</div>

    <label>Metragem da Edificação (m²):</label>
    <input type="number" id="area" placeholder="Ex: 75.00" step="0.01">

    <label>Tipo de Serviço:</label>
    <select id="inputServico" onchange="toggleCub()">
        <option value="">Selecione o serviço...</option>
        <option value="aprovacao">Aprovação de projetos</option>
        <option value="substituicao">Substituição de projetos</option>
        <option value="vistoria">Habite-se</option>
    </select>

    <div id="secaoCub" style="display: none;">
        <label>Tipologia do CUB:</label>
        <select id="inputCub" onchange="atualizarDescricao()">
            <option value="">Selecione uma tipologia...</option>
            <option value="2527.46">R1-B</option>
            <option value="3157.82">R1-N</option>
            <option value="3852.65">R1-A</option>
            <option value="2513.07">CSL-8</option>
            <option value="1387.04">GI</option>
        </select>
        <div id="painelDescricao"></div>
    </div>

    <button onclick="gerarFechamento()">Gerar Relatório Detalhado</button>

    <div id="displayResultado" class="result-box">
        <div class="total-destaque">
            VALOR TOTAL DO FECHAMENTO
            <span id="txtTotal">R$ 0,00</span>
        </div>
        <div class="detalhes-container" id="detalhesRelatorio"></div>
    </div>
</div>

<script>
    const UFM = 39.35;

    const descricoes = {
        "2527.46": "<b>R1-B:</b> Residência unifamiliar padrão baixo: 1 pavimento, com 2 dormitórios, sala, banheiro, cozinha e área para tanque.",
        "3157.82": "<b>R1-N:</b> Residência unifamiliar padrão normal: 1 pavimento, 3 dormitórios, sendo um suíte com banheiro, banheiro social, sala, circulação, cozinha, área de serviço com banheiro e varanda (abrigo para automóvel).",
        "3852.65": "<b>R1-A:</b> Residência unifamiliar padrão alto: 1 pavimento, 4 dormitórios, sendo um suíte com banheiro e closet, outro com banheiro, banheiro social, sala de estar, sala de jantar e sala íntima, circulação, cozinha, área de serviço completa e varanda (abrigo para automóvel).",
        "2513.07": "<b>CSL-8:</b> Edifício comercial, com lojas e salas: Garagem, pavimento térreo e 8 pavimentos-tipo.",
        "1387.04": "<b>GI:</b> Galpão industrial: Área composta de um galpão com área administrativa, 2 banheiros, um vestiário e um depósito."
    };

    function toggleCub() {
        const servico = document.getElementById('inputServico').value;
        const secaoCub = document.getElementById('secaoCub');
        secaoCub.style.display = (servico === 'aprovacao') ? 'block' : 'none';
        if(servico !== 'aprovacao') {
            document.getElementById('inputCub').value = "";
            document.getElementById('painelDescricao').style.display = 'none';
        }
    }

    function atualizarDescricao() {
        const select = document.getElementById('inputCub');
        const painel = document.getElementById('painelDescricao');
        const valor = select.value;
        if (valor && descricoes[valor]) {
            painel.innerHTML = descricoes[valor];
            painel.style.display = 'block';
        } else {
            painel.style.display = 'none';
        }
    }

    function gerarFechamento() {
        const area = parseFloat(document.getElementById('area').value);
        const servico = document.getElementById('inputServico').value;
        const cubBase = parseFloat(document.getElementById('inputCub').value) || 0;

        if (!area || !servico) { alert("Por favor, preencha a área e o serviço."); return; }
        if (servico === 'aprovacao' && !cubBase) { alert("Selecione a tipologia do CUB."); return; }

        let totalCUB = 0, b30 = 0, vM2 = 0;
        if (servico === 'aprovacao' && cubBase > 0) {
            b30 = cubBase * 0.30;
            vM2 = b30 * 0.03;
            totalCUB = vM2 * area;
        }

        const matriz = {
            aprovacao: [1.98, 3.95, 5.93, 7.90, 7.90, 19.76, 27.67, 39.52],
            substituicao: [1.58, 3.16, 4.74, 6.32, 9.49, 15.81, 22.13, 31.62],
            vistoria: [2.37, 3.16, 5.93, 4.74, 5.93, 6.32, 7.11, 7.90]
        };

        let idx = area <= 60 ? 0 : area <= 100 ? 1 : area <= 200 ? 2 : area < 601 ? 3 : area <= 1000 ? 4 : area <= 2000 ? 5 : area <= 6000 ? 6 : 7;
        const mult = matriz[servico][idx];
        const totalTaxa = mult * UFM;

        const moeda = (v) => v.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        document.getElementById('displayResultado').style.display = 'block';
        document.getElementById('txtTotal').innerText = moeda(totalCUB + totalTaxa);

        let htmlDetalhes = "";

        if (servico === 'aprovacao') {
            htmlDetalhes += `
                <strong>Detalhamento Técnico (CUB)</strong>
                <div class="linha"><span>CUB Base aplicado:</span> <span>${moeda(cubBase)}</span></div>
                <div class="linha"><span>Base de Cálculo (30%):</span> <span>${moeda(b30)}</span></div>
                <div class="linha"><span>Valor p/ m² (3%):</span> <span>${moeda(vM2)}</span></div>
                <div class="linha sub-total"><span>Subtotal CUB:</span> <span>${moeda(totalCUB)}</span></div>
                <div class="box-atencao">Valores atualizados conforme o CUB referente ao mês de dezembro mais recente.</div>
            `;
        }

        const nomesServicos = {
            aprovacao: "Aprovação de Projetos",
            substituicao: "Substituição de Projetos",
            vistoria: "Habite-se"
        };

        htmlDetalhes += `
            <strong>Taxa de Análise (UFM)</strong>
            <div class="linha"><span>Serviço selecionado:</span> <span>${nomesServicos[servico]}</span></div>
            <div class="linha"><span>Valor da UFM vigente:</span> <span>${moeda(UFM)}</span></div>
            <div class="linha"><span>Multiplicador da Faixa:</span> <span>${mult.toFixed(2)}</span></div>
            <div class="linha sub-total"><span>Subtotal Taxa:</span> <span>${moeda(totalTaxa)}</span></div>
            <div class="box-atencao">Valores calculados com base na Lei nº 1.247 - Código Tributário Municipal, para visualização <a href="https://leismunicipais.com.br/codigo-tributario-mandaguacu-pr" target="_blank">clique aqui</a>.</div>
        `;

        document.getElementById('detalhesRelatorio').innerHTML = htmlDetalhes;
    }
</script>
